{% extends "base.html" %}
{% block title %}Désactivation Sécurité - InfraControl{% endblock %}

{% block content %}
<style>
    /* --- 1. THEME "SHIELD DOWN" --- */
    :root {
        --bg-danger-deep: #150202;
        --neon-crimson: #dc2626;
        --neon-dark-red: #7f1d1d;
        --text-white: #f8fafc;
        --glass-panel: rgba(20, 5, 5, 0.9);
    }

    /* Force le texte blanc */
    .danger-wrapper {
        color: var(--text-white);
        position: relative;
        z-index: 10;
        min-height: 80vh;
        display: flex;
        align-items: center;
    }

    h3, p, label, a { color: var(--text-white) !important; }
    .text-muted { color: #cbd5e1 !important; opacity: 0.7; }

    /* --- 2. BACKGROUND DESKTOP (DIGITAL DEBRIS) --- */
    #debris-canvas {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        z-index: 0;
        background: var(--bg-danger-deep);
    }

    /* --- 3. BACKGROUND MOBILE (RED ALERT SIREN) --- */
    .mobile-siren-bg {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        z-index: 0;
        background: #000;
        overflow: hidden;
    }

    .siren-light {
        position: absolute;
        top: -50%; left: -50%;
        width: 200%; height: 200%;
        background: conic-gradient(
            from 0deg,
            transparent 0deg,
            rgba(220, 38, 38, 0.05) 60deg,
            rgba(220, 38, 38, 0.4) 90deg,
            rgba(220, 38, 38, 0.05) 120deg,
            transparent 180deg
        );
        animation: sirenSpin 4s linear infinite;
    }

    @keyframes sirenSpin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    /* --- 4. UI CARTE & FORMULAIRE --- */
    .danger-card {
        background: var(--glass-panel);
        backdrop-filter: blur(10px);
        border: 1px solid var(--neon-crimson);
        border-radius: 8px;
        box-shadow: 0 0 40px rgba(220, 38, 38, 0.15);
        position: relative;
        overflow: hidden;
    }

    /* Bande hachurée Danger */
    .hazard-top {
        height: 6px;
        width: 100%;
        background: repeating-linear-gradient(
            -45deg,
            #000,
            #000 10px,
            var(--neon-crimson) 10px,
            var(--neon-crimson) 20px
        );
    }

    /* Icone animée */
    .shield-icon-container {
        display: inline-block;
        position: relative;
        margin-bottom: 1.5rem;
    }
    
    .shield-icon-container i {
        font-size: 3.5rem;
        color: var(--neon-crimson);
        text-shadow: 0 0 20px rgba(220, 38, 38, 0.6);
    }

    /* Input Password */
    .form-control {
        background-color: rgba(0, 0, 0, 0.6) !important;
        border: 1px solid var(--neon-dark-red);
        color: var(--neon-crimson) !important;
        font-family: 'Courier New', monospace;
        letter-spacing: 2px;
        text-align: center;
        transition: 0.3s;
    }

    .form-control:focus {
        border-color: var(--neon-crimson);
        box-shadow: 0 0 15px rgba(220, 38, 38, 0.3);
        background-color: black !important;
    }

    .form-control::placeholder {
        letter-spacing: normal;
        color: rgba(255, 255, 255, 0.3);
        font-family: sans-serif;
        font-size: 0.9rem;
    }

    /* Bouton Destructif */
    .btn-nuke {
        background: transparent;
        border: 1px solid var(--neon-crimson);
        color: var(--neon-crimson);
        text-transform: uppercase;
        font-weight: 700;
        letter-spacing: 1px;
        position: relative;
        overflow: hidden;
        transition: 0.3s;
    }

    .btn-nuke::before {
        content: '';
        position: absolute;
        top: 0; left: 0;
        width: 0%; height: 100%;
        background: var(--neon-crimson);
        z-index: -1;
        transition: width 0.3s ease-in-out;
    }

    .btn-nuke:hover::before { width: 100%; }
    .btn-nuke:hover { color: white; box-shadow: 0 0 25px rgba(220, 38, 38, 0.6); }

</style>

<canvas id="debris-canvas" class="d-none d-lg-block"></canvas>

<div class="mobile-siren-bg d-lg-none">
    <div class="siren-light"></div>
</div>

<div class="container danger-wrapper">
    <div class="row justify-content-center w-100">
        <div class="col-md-6 col-lg-5">
            
            <div class="card danger-card">
                <div class="hazard-top"></div>
                
                <div class="card-body p-4 text-center">
                    
                    <div class="shield-icon-container">
                        <i class="fas fa-shield-virus animate__animated animate__pulse animate__infinite"></i>
                    </div>

                    <h3 class="fw-bold text-uppercase mb-2">Protocole Désactivation</h3>
                    <p class="text-muted small mb-4">
                        <i class="fas fa-exclamation-triangle text-warning me-1"></i>
                        Attention : La suppression du 2FA rendra votre compte vulnérable aux accès non autorisés.
                    </p>

                    <form method="POST" class="text-start">
                        {% csrf_token %}
                        
                        <div class="mb-4">
                            <label class="small text-uppercase text-muted mb-2 d-block text-center">
                                Confirmez votre clé d'accès
                            </label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-danger text-danger">
                                    <i class="fas fa-key"></i>
                                </span>
                                <input type="password" name="password" 
                                       class="form-control border-start-0 ps-0" 
                                       placeholder="••••••••••••" 
                                       required autofocus>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-nuke w-100 py-2">
                            <i class="fas fa-trash-alt me-2"></i> SUPPRIMER LA SÉCURITÉ
                        </button>
                    </form>

                    <div class="mt-4 pt-3 border-top border-danger border-opacity-25">
                        <a href="{% url 'profile' %}" class="text-decoration-none small text-muted hover-white">
                            <i class="fas fa-undo me-1"></i> Annuler et garder la protection
                        </a>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const canvas = document.getElementById('debris-canvas');
    if (canvas && window.innerWidth >= 992) {
        const ctx = canvas.getContext('2d');
        let w, h;
        
        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const particleCount = 70;
        const particles = [];

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * w;
                this.y = Math.random() * -h; // Commence au dessus
                this.speed = Math.random() * 2 + 1;
                this.size = Math.random() * 3 + 1;
                this.opacity = Math.random() * 0.5 + 0.1;
                this.wobble = Math.random() * Math.PI * 2;
            }

            update() {
                this.y += this.speed;
                this.wobble += 0.05;
                this.x += Math.sin(this.wobble) * 0.5; // Léger mouvement latéral (feuille qui tombe)

                if (this.y > h) {
                    this.reset();
                }
            }

            draw() {
                ctx.fillStyle = `rgba(220, 38, 38, ${this.opacity})`;
                ctx.fillRect(this.x, this.y, this.size, this.size); // Carrés = Digital
            }
        }

        // Init
        for(let i=0; i<particleCount; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, w, h);
            
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }
        animate();
    }
});
</script>
{% endblock %}
