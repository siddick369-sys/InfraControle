{% extends "base.html" %}
{% block content %}

<h2>🔥 Heatmap logique Wi-Fi</h2>

<div id="heatmap" class="d-flex flex-wrap gap-2"></div>

<script>
async function loadHeatmap() {
    const res = await fetch("{% url 'wifi_heatmap_api' %}");
    const data = await res.json();

    const container = document.getElementById("heatmap");
    container.innerHTML = "";

    data.radios.forEach(r => {
        const div = document.createElement("div");

        div.className = "p-3 text-white text-center";
        div.style.width = "180px";
        div.style.borderRadius = "8px";
        div.style.background =
            r.couleur === "red" ? "#dc3545" :
            r.couleur === "yellow" ? "#ffc107" :
            r.couleur === "green" ? "#198754" : "#6c757d";

        div.innerHTML = `
            <strong>${r.ap}</strong><br>
            ${r.bande} GHz – canal ${r.canal}<br>
            Clients : ${r.clients}<br>
            Utilisation : ${r.utilisation}%
        `;

        container.appendChild(div);
    });
}

loadHeatmap();
setInterval(loadHeatmap, 5000);
</script>

{% endblock %}
