{% extends "base.html" %}
{% block title %}Nouveau Mot de Passe - InfraControl{% endblock %}

{% block content %}
<style>
    /* --- 1. THEME "RE-KEYING" (VIOLET/PLASMA) --- */
    :root {
        --bg-void: #0b0218; /* Violet quasi noir */
        --neon-violet: #8b5cf6;
        --neon-plasma: #3b82f6;
        --text-white: #f8fafc;
        --card-glass: rgba(17, 10, 35, 0.85);
        --input-dark: rgba(0, 0, 0, 0.6);
    }

    /* Force le texte blanc */
    .rekey-wrapper {
        color: var(--text-white);
        position: relative;
        z-index: 10;
        min-height: 85vh;
        display: flex;
        align-items: center;
    }

    h3, p, label, a { color: var(--text-white) !important; }

    /* --- 2. BACKGROUND DESKTOP (CONSTELLATION) --- */
    #crypto-canvas {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        z-index: 0;
        background: var(--bg-void);
    }

    /* --- 3. BACKGROUND MOBILE (PLASMA FLOW) --- */
    .mobile-plasma-bg {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        z-index: 0;
        background: #020617;
        overflow: hidden;
    }

    .plasma-blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.6;
        animation: floatPlasma 10s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
    }

    .blob-1 {
        top: -10%; left: -10%; width: 70vw; height: 70vw;
        background: var(--neon-violet);
    }
    
    .blob-2 {
        bottom: -10%; right: -10%; width: 80vw; height: 80vw;
        background: var(--neon-plasma);
        animation-delay: -5s;
    }

    @keyframes floatPlasma {
        0% { transform: translate(0, 0) scale(1); }
        100% { transform: translate(20px, 40px) scale(1.1); }
    }

    /* --- 4. CARTE & UI --- */
    .rekey-card {
        background: var(--card-glass);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(139, 92, 246, 0.3);
        border-radius: 16px;
        box-shadow: 0 0 50px rgba(139, 92, 246, 0.15);
        overflow: hidden;
    }

    /* Icone Cadenas qui se reconstruit */
    .lock-construct {
        width: 80px; height: 80px;
        margin: 0 auto 20px;
        background: rgba(139, 92, 246, 0.1);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px dashed var(--neon-violet);
        position: relative;
    }

    .lock-construct i {
        text-shadow: 0 0 15px var(--neon-violet);
    }

    /* Inputs */
    .form-control {
        background-color: var(--input-dark) !important;
        border: 1px solid #4c1d95;
        color: var(--neon-violet) !important;
        font-family: 'Consolas', monospace;
        letter-spacing: 1px;
    }

    .form-control:focus {
        border-color: var(--neon-plasma);
        box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        background-color: black !important;
    }
    
    .form-control::placeholder {
        letter-spacing: normal;
        font-family: sans-serif;
        opacity: 0.5;
    }

    /* Indicateur de force (visuel) */
    .strength-bar {
        height: 4px;
        background: rgba(255,255,255,0.1);
        margin-top: 5px;
        border-radius: 2px;
        overflow: hidden;
        display: flex;
    }
    .strength-segment {
        flex: 1;
        margin-right: 2px;
        background: transparent;
        transition: 0.3s;
    }
    /* Simulation visuelle : on allume les segments au focus pour le style */
    .form-control:focus ~ .strength-bar .strength-segment:nth-child(1) { background: #ef4444; }
    .form-control:focus ~ .strength-bar .strength-segment:nth-child(2) { background: #f59e0b; }
    .form-control:focus ~ .strength-bar .strength-segment:nth-child(3) { background: #10b981; }

    /* Bouton Action */
    .btn-rekey {
        background: linear-gradient(90deg, #6d28d9 0%, #3b82f6 100%);
        border: none;
        color: white;
        text-transform: uppercase;
        font-weight: 600;
        letter-spacing: 1px;
        transition: 0.3s;
    }

    .btn-rekey:hover {
        box-shadow: 0 0 25px rgba(139, 92, 246, 0.5);
        color: white;
        transform: translateY(-2px);
    }

</style>

<canvas id="crypto-canvas" class="d-none d-lg-block"></canvas>

<div class="mobile-plasma-bg d-lg-none">
    <div class="plasma-blob blob-1"></div>
    <div class="plasma-blob blob-2"></div>
</div>

<div class="container rekey-wrapper">
    <div class="row justify-content-center w-100">
        <div class="col-md-6 col-lg-5">
            
            <div class="card rekey-card p-4">
                <div class="card-body">
                    
                    <div class="text-center">
                        <div class="lock-construct">
                            <i class="fas fa-sync-alt fa-2x fa-spin" style="animation-duration: 3s; color: var(--neon-violet);"></i>
                        </div>
                        <h3 class="fw-bold mb-2">CRYPTO RE-KEY</h3>
                        <p class="text-white-50 small mb-4">
                            Définition des nouveaux paramètres d'accès pour<br>
                            <span class="text-white font-monospace border-bottom border-secondary pb-1">{{ user.username }}</span>
                        </p>
                    </div>

                    <form method="POST">
                        {% csrf_token %}
                        <input type="hidden" name="website" value="">

                        <div class="mb-4">
                            <label for="password1" class="form-label small text-uppercase text-muted">Nouvelle clé secrète</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-secondary text-muted"><i class="fas fa-key"></i></span>
                                <input type="password" id="password1" name="password1" class="form-control" required placeholder="••••••••">
                            </div>
                            <div class="strength-bar">
                                <div class="strength-segment"></div>
                                <div class="strength-segment"></div>
                                <div class="strength-segment"></div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="password2" class="form-label small text-uppercase text-muted">Confirmation</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-secondary text-muted"><i class="fas fa-check-double"></i></span>
                                <input type="password" id="password2" name="password2" class="form-control" required placeholder="••••••••">
                            </div>
                        </div>

                        <button type="submit" class="btn btn-rekey w-100 py-2">
                            <i class="fas fa-shield-alt me-2"></i> ACTIVER LE CHIFFREMENT
                        </button>
                    </form>

                    <div class="text-center mt-4 pt-3 border-top border-secondary border-opacity-25">
                        <a href="{% url 'connexion' %}" class="text-decoration-none small text-muted hover-white">
                            <i class="fas fa-arrow-left me-1"></i> Annuler et retourner au login
                        </a>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const canvas = document.getElementById('crypto-canvas');
    if (canvas && window.innerWidth >= 992) {
        const ctx = canvas.getContext('2d');
        let w, h;
        
        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Particules "Noeuds de chiffrement"
        const nodes = [];
        const nodeCount = 50;
        const connectionDistance = 150;

        class Node {
            constructor() {
                this.x = Math.random() * w;
                this.y = Math.random() * h;
                this.vx = (Math.random() - 0.5) * 1;
                this.vy = (Math.random() - 0.5) * 1;
                this.size = Math.random() * 2 + 1;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                // Rebond
                if (this.x < 0 || this.x > w) this.vx *= -1;
                if (this.y < 0 || this.y > h) this.vy *= -1;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = '#8b5cf6'; // Violet
                ctx.fill();
            }
        }

        // Init
        for(let i=0; i<nodeCount; i++) nodes.push(new Node());

        function animate() {
            ctx.clearRect(0, 0, w, h);
            
            // Dessiner les connexions d'abord
            for (let i = 0; i < nodes.length; i++) {
                for (let j = i + 1; j < nodes.length; j++) {
                    const dx = nodes[i].x - nodes[j].x;
                    const dy = nodes[i].y - nodes[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < connectionDistance) {
                        ctx.beginPath();
                        // Opacité basée sur la distance
                        const alpha = 1 - (dist / connectionDistance);
                        ctx.strokeStyle = `rgba(139, 92, 246, ${alpha * 0.5})`;
                        ctx.lineWidth = 1;
                        ctx.moveTo(nodes[i].x, nodes[i].y);
                        ctx.lineTo(nodes[j].x, nodes[j].y);
                        ctx.stroke();
                    }
                }
            }

            // Dessiner les noeuds
            nodes.forEach(node => {
                node.update();
                node.draw();
            });

            requestAnimationFrame(animate);
        }
        animate();
    }
});
</script>
{% endblock %}
