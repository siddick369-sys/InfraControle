{% extends "base.html" %}
{% block title %}Authentification - InfraControl{% endblock %}

{% block content %}
<style>
    /* --- RÉUTILISATION DU THÈME GLOBAL (Même CSS que l'inscription) --- */
    :root {
        --bg-deep: #0b1120;
        --bg-card: rgba(30, 41, 59, 0.7);
        --text-main: #e2e8f0;
        --text-muted: #94a3b8;
        --accent-cyan: #0ea5e9;
        --accent-alert: #ef4444; /* Ajout pour les erreurs */
        --input-bg: rgba(15, 23, 42, 0.8);
        --border-color: #334155;
    }

    body {
        background-color: var(--bg-deep);
        color: var(--text-main);
        font-family: 'Segoe UI', 'Roboto', sans-serif;
        overflow-x: hidden;
    }

    /* Animation de fond */
    #network-canvas {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        z-index: -1;
        background: radial-gradient(circle at center, #1e293b 0%, #0b1120 100%);
    }

    /* Carte Glassmorphism */
    .tech-card {
        background: var(--bg-card);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(14, 165, 233, 0.2); /* Bordure légèrement plus brillante pour le login */
        border-radius: 12px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
    }

    /* Inputs style Terminal */
    .form-control {
        background-color: var(--input-bg);
        border: 1px solid var(--border-color);
        color: var(--accent-cyan);
        font-family: 'Consolas', 'Monaco', monospace;
        letter-spacing: 0.5px;
        transition: all 0.3s ease;
    }

    .form-control:focus {
        background-color: var(--input-bg);
        border-color: var(--accent-cyan);
        box-shadow: 0 0 0 2px rgba(14, 165, 233, 0.25);
        color: white;
    }

    /* Bouton d'action */
    .btn-tech {
        background: linear-gradient(90deg, var(--accent-cyan) 0%, #0284c7 100%);
        border: none;
        color: white;
        font-weight: 600;
        text-transform: uppercase;
        font-size: 0.9rem;
        letter-spacing: 1px;
    }
    
    .btn-tech:hover {
        box-shadow: 0 0 15px rgba(14, 165, 233, 0.5);
        color: #fff;
    }

    /* Loader spécifique Login */
    #login-loader {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background-color: var(--bg-deep);
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: 'Courier New', monospace;
        color: var(--accent-cyan);
    }
</style>

<div id="login-loader">
    <div class="text-start">
        <div>> INITIATING HANDSHAKE...</div>
        <div id="loader-text" class="text-muted mt-2">Checking protocols...</div>
    </div>
</div>

<canvas id="network-canvas"></canvas>

<div class="container" style="padding-top: 10vh;">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            
            <div class="text-center mb-4">
                <i class="fas fa-server fa-3x mb-3" style="color: var(--accent-cyan);"></i>
                <h4 class="fw-bold text-uppercase tracking-wider">Accès Admin</h4>
            </div>

            <div class="card tech-card p-4">
                <div class="card-body">
                    
                    <form method="POST" id="login-form">
                        {% csrf_token %}

                        <input type="hidden" name="{{ dynamic_key }}" value="{{ token }}">
                        <input type="hidden" id="{{ trap_name }}" name="{{ trap_name }}" value="">
                        <input type="text" name="website" style="display:none !important" autocomplete="off" tabindex="-1">

                        <div class="form-group mb-3">
                            <label class="small text-muted mb-1">> USER_ID</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-secondary text-muted"><i class="fas fa-user-shield"></i></span>
                                <input type="text" name="username" class="form-control border-start-0 ps-0" placeholder="admin" required autofocus>
                            </div>
                        </div>

                        <div class="form-group mb-4">
                            <div class="d-flex justify-content-between">
                                <label class="small text-muted mb-1">> ACCESS_KEY</label>
                                <a href="{% url 'reset_password_request' %}" class="small text-decoration-none" style="color: var(--accent-cyan); opacity: 0.7;">Lost key?</a>
                            </div>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-secondary text-muted"><i class="fas fa-key"></i></span>
                                <input type="password" name="password" class="form-control border-start-0 ps-0" placeholder="•••••••" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-tech w-100 py-2">
                            <i class="fas fa-power-off me-2"></i> ÉTABLIR LA SESSION
                        </button>
                    </form>

                </div>
            </div>

            <div class="text-center mt-4">
                <p class="small text-muted">Nouvel administrateur ?</p>
                <a href="{% url 'inscription' %}" class="btn btn-outline-light btn-sm px-4" style="border-color: var(--border-color); color: var(--text-muted);">
                    Créer un compte
                </a>
            </div>

        </div>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    /* --- 1. SÉCURITÉ (Délai et Trap) --- */
    const trap = document.getElementById("{{ trap_name }}");
    const delay = Math.random() * 1500 + 500; // Un peu plus rapide sur le login
    setTimeout(() => {
        if (trap) trap.value = "ok";
        // Appel silencieux pour la défense timing
        fetch("{% url 'set_form_start_time' %}", {
            method: "POST", 
            headers: {"X-CSRFToken": "{{ csrf_token }}"}
        }).catch(e => {}); 
    }, delay);

    /* --- 2. LOADER RAPIDE --- */
    const loader = document.getElementById('login-loader');
    setTimeout(() => {
        loader.style.opacity = '0';
        setTimeout(() => { loader.style.display = 'none'; }, 500);
    }, 800); // Simulation rapide pour le login

    /* --- 3. BACKGROUND NETWORK (Code Canvas identique) --- */
    const canvas = document.getElementById('network-canvas');
    const ctx = canvas.getContext('2d');
    let width, height, particles = [];
    const particleCount = 45; // Un peu moins de particules pour alléger le login
    const connectionDistance = 140;
    
    function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
    class Particle {
        constructor() {
            this.x = Math.random() * width; this.y = Math.random() * height;
            this.vx = (Math.random() - 0.5) * 0.8; this.vy = (Math.random() - 0.5) * 0.8;
            this.size = Math.random() * 2 + 1;
        }
        update() {
            this.x += this.vx; this.y += this.vy;
            if (this.x < 0 || this.x > width) this.vx *= -1;
            if (this.y < 0 || this.y > height) this.vy *= -1;
        }
        draw() {
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(14, 165, 233, 0.4)'; ctx.fill();
        }
    }
    function init() { particles = []; for(let i=0; i<particleCount; i++) particles.push(new Particle()); }
    function animate() {
        ctx.clearRect(0, 0, width, height);
        particles.forEach((p, i) => {
            p.update(); p.draw();
            for (let j = i + 1; j < particles.length; j++) {
                const p2 = particles[j];
                const d = Math.sqrt((p.x - p2.x)**2 + (p.y - p2.y)**2);
                if (d < connectionDistance) {
                    ctx.beginPath(); ctx.strokeStyle = `rgba(14, 165, 233, ${1 - d/connectionDistance})`;
                    ctx.lineWidth = 0.5; ctx.moveTo(p.x, p.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
                }
            }
        });
        requestAnimationFrame(animate);
    }
    window.addEventListener('resize', resize); resize(); init(); animate();
});
</script>
{% endblock %}
