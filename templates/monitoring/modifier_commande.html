{% extends "base.html" %}
{% block content %}

<h2>✏️ Modifier la commande</h2>

<form method="post">
    {% csrf_token %}

    <div class="mb-3">
        <label class="form-label">Nom</label>
        <input type="text" name="nom" class="form-control"
               value="{{ commande.nom }}" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Description</label>
        <textarea name="description" class="form-control"
                  rows="2">{{ commande.description }}</textarea>
    </div>

    <div class="mb-3">
        <label class="form-label">Commandes SSH</label>
        <textarea name="contenu" class="form-control"
                  rows="8" required>{{ commande.contenu }}</textarea>
        <small class="text-muted">
            Une commande par ligne (supporte sudo)
        </small>
    </div>

    <div class="mb-3">
        <label class="form-label">Équipements ciblés</label>
        <select name="equipements" multiple class="form-select">
            {% for eq in equipements %}
                <option value="{{ eq.id }}"
                    {% if eq in commande.applicable_pour.all %}selected{% endif %}>
                    {{ eq.nom }} ({{ eq.adresse_ip }})
                </option>
            {% endfor %}
        </select>
        <small class="text-muted">
            Laisser vide = tous les équipements
        </small>
    </div>

    <div class="form-check mb-2">
        <input class="form-check-input" type="checkbox"
               name="critique" {% if commande.critique %}checked{% endif %}>
        <label class="form-check-label">
            Commande critique
        </label>
    </div>

    <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox"
               name="confirmation_requise"
               {% if commande.confirmation_requise %}checked{% endif %}>
        <label class="form-check-label">
            Confirmation requise avant exécution
        </label>
    </div>

    <button class="btn btn-success">💾 Enregistrer</button>
    <a href="{% url 'commande_detail' commande.id %}"
       class="btn btn-secondary">Annuler</a>
</form>

{% endblock %}
