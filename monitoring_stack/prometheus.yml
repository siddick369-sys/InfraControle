# =============================================
# PROMETHEUS - Configuration Infracontrol
# =============================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# Alertmanager
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Règles d'alerte
rule_files:
  - /etc/prometheus/alert_rules.yml

# Cibles de scrape
scrape_configs:
  # --- Django Application ---
  - job_name: 'django'
    metrics_path: /prometheus/metrics
    static_configs:
      - targets: ['django:8000']
        labels:
          service: 'infracontrol-django'

  # --- Node Exporter (Métriques Système) ---
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'infracontrol-node'

  # --- cAdvisor (Métriques Conteneurs) ---
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          service: 'infracontrol-cadvisor'

  # --- Prometheus self-monitoring ---
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

