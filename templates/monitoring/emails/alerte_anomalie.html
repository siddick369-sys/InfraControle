<!DOCTYPE html>
<html>
<body style="font-family: Arial, sans-serif; color: #333;">
    <div style="background-color: #f8d7da; color: #721c24; padding: 20px; border-radius: 5px;">
        <h2 style="margin-top: 0;">⚠️ Incident Détecté</h2>
        <p>Une anomalie critique a été détectée sur votre infrastructure.</p>
    </div>
    <table style="width: 100%; margin-top: 20px; border-collapse: collapse;">
        <tr>
            <td style="padding: 10px; border: 1px solid #ddd; font-weight: bold;">Équipement :</td>
            <td style="padding: 10px; border: 1px solid #ddd;">{{ equipement.nom }} ({{ equipement.adresse_ip }})</td>
        </tr>
        <tr>
            <td style="padding: 10px; border: 1px solid #ddd; font-weight: bold;">Type d'anomalie :</td>
            <td style="padding: 10px; border: 1px solid #ddd; color: #d9534f;"><strong>{{ anomalie }}</strong></td>
        </tr>
        <tr>
            <td style="padding: 10px; border: 1px solid #ddd; font-weight: bold;">Heure :</td>
            <td style="padding: 10px; border: 1px solid #ddd;">{{ date }}</td>
        </tr>
    </table>
    <p style="margin-top: 20px;">
        <a href="https://votre-infra-control.com/equipements/{{ equipement.id }}" 
           style="background-color: #007bff; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px;">
           Voir les détails sur InfraControl
        </a>
    </p>
</body>
</html>
