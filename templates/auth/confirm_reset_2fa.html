{% extends "base.html" %}
{% block title %}Reset Security Protocol - InfraControl{% endblock %}

{% block content %}
<style>
    /* --- 1. THEME "SYSTEM OVERRIDE" (AMBER/GOLD) --- */
    :root {
        --bg-void: #0f0501; /* Noir teinté d'orange très sombre */
        --neon-amber: #f59e0b; /* Orange "Maintenance" */
        --neon-gold: #fbbf24;
        --text-white: #f8fafc;
        --card-glass: rgba(20, 10, 5, 0.85);
        --input-dark: rgba(0, 0, 0, 0.6);
    }

    /* Force le texte en blanc */
    .reset-wrapper {
        color: var(--text-white);
        position: relative;
        z-index: 10;
        min-height: 80vh;
        display: flex;
        align-items: center;
    }

    h2, p, label { color: var(--text-white) !important; }

    /* --- 2. BACKGROUND DESKTOP (VORTEX) --- */
    #vortex-canvas {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        z-index: 0;
        background: var(--bg-void);
    }

    /* --- 3. BACKGROUND MOBILE (PLASMA AMBRE) --- */
    .mobile-plasma-bg {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        z-index: 0;
        background: linear-gradient(135deg, #1a0802, #000000);
        overflow: hidden;
    }

    /* Couches de plasma mouvant */
    .plasma-layer {
        position: absolute;
        border-radius: 50%;
        filter: blur(60px);
        opacity: 0.5;
        animation: floatPlasma 10s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
    }

    .p-1 { top: -20%; left: -20%; width: 80vw; height: 80vw; background: var(--neon-amber); }
    .p-2 { bottom: -20%; right: -20%; width: 90vw; height: 90vw; background: #7c2d12; animation-delay: -5s; }

    @keyframes floatPlasma {
        0% { transform: scale(1) translate(0, 0); }
        100% { transform: scale(1.1) translate(20px, 40px); }
    }

    /* --- 4. CARTE & UI --- */
    .override-card {
        background: var(--card-glass);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border: 1px solid rgba(245, 158, 11, 0.3);
        border-radius: 12px;
        box-shadow: 0 0 50px rgba(245, 158, 11, 0.15);
    }

    .icon-header {
        position: relative;
        display: inline-block;
        padding: 20px;
        border-radius: 50%;
        background: rgba(245, 158, 11, 0.1);
        border: 1px dashed var(--neon-amber);
        margin-bottom: 20px;
    }

    /* Inputs Style Terminal */
    .form-control {
        background-color: var(--input-dark) !important;
        border: 1px solid #78350f;
        color: var(--neon-amber) !important;
        font-family: 'Consolas', monospace;
    }

    .form-control:focus {
        border-color: var(--neon-gold);
        box-shadow: 0 0 15px rgba(251, 191, 36, 0.3);
        background-color: black !important;
    }

    /* Bouton Reset */
    .btn-override {
        background: linear-gradient(90deg, #ea580c 0%, #d97706 100%);
        border: none;
        color: white;
        text-transform: uppercase;
        font-weight: 700;
        letter-spacing: 1px;
        position: relative;
        overflow: hidden;
    }

    .btn-override:hover {
        color: white;
        box-shadow: 0 0 20px rgba(234, 88, 12, 0.5);
    }
    
    /* Animation de glitch sur le bouton au survol */
    .btn-override:hover i {
        animation: shake 0.5s;
    }

    @keyframes shake {
        0% { transform: rotate(0deg); }
        25% { transform: rotate(10deg); }
        75% { transform: rotate(-10deg); }
        100% { transform: rotate(0deg); }
    }

</style>

<canvas id="vortex-canvas" class="d-none d-lg-block"></canvas>

<div class="mobile-plasma-bg d-lg-none">
    <div class="plasma-layer p-1"></div>
    <div class="plasma-layer p-2"></div>
</div>

<div class="container reset-wrapper">
    <div class="row justify-content-center w-100">
        <div class="col-md-6 col-lg-5">
            
            <div class="card override-card p-4">
                <div class="card-body text-center">
                    
                    <div class="icon-header">
                        <i class="fas fa-unlock-alt fa-3x" style="color: var(--neon-amber);"></i>
                    </div>

                    <h3 class="fw-bold text-uppercase mb-2">Réinitialisation 2FA</h3>
                    <p class="text-white-50 small mb-4">
                        Mode de récupération activé. Veuillez saisir le token d'urgence envoyé par email.
                    </p>

                    <form method="POST" class="text-start">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label small text-muted text-uppercase">Identification (Email)</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-secondary text-muted"><i class="fas fa-at"></i></span>
                                <input type="email" name="email" class="form-control" placeholder="admin@system.local" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label small text-muted text-uppercase">Code de contournement</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-secondary text-muted"><i class="fas fa-code"></i></span>
                                <input type="text" name="code" class="form-control" placeholder="X-X-X-X-X" required autocomplete="off">
                            </div>
                        </div>

                        <button type="submit" class="btn btn-override w-100 py-2">
                            <i class="fas fa-biohazard me-2"></i> FORCER LA RÉINITIALISATION
                        </button>
                    </form>
                    
                    <div class="mt-4 pt-3 border-top border-secondary border-opacity-25">
                         <a href="{% url 'profile' %}" class="text-decoration-none small text-muted hover-white">
                            <i class="fas fa-arrow-left me-1"></i> Annuler l'opération
                        </a>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const canvas = document.getElementById('vortex-canvas');
    if (canvas && window.innerWidth >= 992) {
        const ctx = canvas.getContext('2d');
        let w, h;
        
        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Configuration des particules
        const particleCount = 100;
        const particles = [];
        const center = { x: w / 2, y: h / 2 };

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                // Apparaît aléatoirement loin du centre
                this.angle = Math.random() * Math.PI * 2;
                this.radius = Math.random() * 200 + 300; // Distance du centre
                this.size = Math.random() * 2 + 1;
                this.speed = Math.random() * 0.01 + 0.005;
                this.color = Math.random() > 0.5 ? '#f59e0b' : '#78350f'; // Ambre ou Brun
            }

            update() {
                // Mouvement en spirale vers le centre
                this.angle += this.speed;
                this.radius -= 0.5; // Se rapproche du centre

                // Si atteint le centre, on reset
                if (this.radius < 10) {
                    this.reset();
                    this.radius = Math.max(w, h) / 2; // Repart du bord
                }

                // Calcul position cartésienne
                this.x = center.x + Math.cos(this.angle) * this.radius;
                this.y = center.y + Math.sin(this.angle) * this.radius;
            }

            draw() {
                // Traînée
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                
                // Effet de lueur selon la proximité du centre
                const alpha = 1 - (this.radius / (Math.max(w, h)/2));
                ctx.globalAlpha = alpha;
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        // Init
        for(let i=0; i<particleCount; i++) particles.push(new Particle());

        function animate() {
            // Effet de traînée noire (Fade out)
            ctx.fillStyle = 'rgba(15, 5, 1, 0.1)';
            ctx.fillRect(0, 0, w, h);

            // Recalcul du centre au cas où resize
            center.x = w / 2;
            center.y = h / 2;

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            // Dessiner un "Trou noir" au centre
            ctx.beginPath();
            ctx.arc(center.x, center.y, 20, 0, Math.PI * 2);
            ctx.fillStyle = '#000';
            ctx.fill();
            ctx.strokeStyle = '#f59e0b';
            ctx.stroke();

            requestAnimationFrame(animate);
        }
        animate();
    }
});
</script>
{% endblock %}
