{% extends "base.html" %}
{% block title %}Récupération Accès - InfraControl{% endblock %}

{% block content %}
<style>
    /* --- 1. THEME "RECOVERY SIGNAL" (INDIGO/PURPLE) --- */
    :root {
        --bg-void: #020410;
        --neon-indigo: #6366f1;
        --neon-purple: #a855f7;
        --text-white: #f8fafc;
        --card-glass: rgba(15, 23, 42, 0.85);
    }

    /* Force le texte blanc */
    .recovery-wrapper {
        color: var(--text-white);
        position: relative;
        z-index: 10;
        min-height: 80vh;
        display: flex;
        align-items: center;
    }

    h2, p, label { color: var(--text-white) !important; }

    /* --- 2. BACKGROUND DESKTOP (SONAR) --- */
    #sonar-canvas {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        z-index: 0;
        background: var(--bg-void);
    }

    /* --- 3. BACKGROUND MOBILE (NEBULA DRIFT) --- */
    .mobile-nebula-bg {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        z-index: 0;
        background: linear-gradient(125deg, #0f172a, #312e81, #1e1b4b);
        background-size: 300% 300%;
        animation: nebulaMove 15s ease infinite;
    }

    @keyframes nebulaMove {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    /* --- 4. CARTE & UI --- */
    .recovery-card {
        background: var(--card-glass);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(168, 85, 247, 0.3);
        border-radius: 16px;
        box-shadow: 0 0 40px rgba(99, 102, 241, 0.15);
        overflow: hidden;
    }

    /* Icone Radar animée */
    .radar-icon-box {
        width: 80px; height: 80px;
        margin: 0 auto 20px;
        background: rgba(99, 102, 241, 0.1);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--neon-indigo);
        position: relative;
    }

    .radar-pulse {
        position: absolute;
        width: 100%; height: 100%;
        border-radius: 50%;
        border: 1px solid var(--neon-purple);
        opacity: 0;
        animation: pulseWave 2s cubic-bezier(0, 0, 0.2, 1) infinite;
    }

    @keyframes pulseWave {
        0% { transform: scale(1); opacity: 0.8; }
        100% { transform: scale(2); opacity: 0; }
    }

    /* Inputs */
    .form-control {
        background-color: rgba(0, 0, 0, 0.5) !important;
        border: 1px solid #4338ca;
        color: var(--neon-indigo) !important;
        font-family: 'Consolas', monospace;
    }

    .form-control:focus {
        border-color: var(--neon-purple);
        box-shadow: 0 0 15px rgba(168, 85, 247, 0.3);
        background-color: rgba(0,0,0,0.8) !important;
    }

    /* Bouton Signal */
    .btn-signal {
        background: linear-gradient(90deg, #4f46e5 0%, #9333ea 100%);
        border: none;
        color: white;
        text-transform: uppercase;
        font-weight: 600;
        letter-spacing: 1px;
        transition: transform 0.2s;
    }

    .btn-signal:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px -5px rgba(147, 51, 234, 0.5);
        color: white;
    }

</style>

<canvas id="sonar-canvas" class="d-none d-lg-block"></canvas>

<div class="mobile-nebula-bg d-lg-none"></div>

<div class="container recovery-wrapper">
    <div class="row justify-content-center w-100">
        <div class="col-md-6 col-lg-5">
            
            <div class="card recovery-card p-4">
                <div class="card-body text-center">
                    
                    <div class="radar-icon-box">
                        <div class="radar-pulse"></div>
                        <i class="fas fa-satellite-dish fa-2x" style="color: var(--neon-purple);"></i>
                    </div>

                    <h3 class="fw-bold mb-2">Récupération 2FA</h3>
                    <p class="text-white-50 small mb-4">
                        Initialisation du protocole de recherche.<br>
                        Veuillez identifier le compte cible.
                    </p>

                    <form method="POST" class="text-start">
                        {% csrf_token %}
                        
                        <div class="mb-4">
                            <label class="small text-uppercase text-muted mb-2">Adresse Email</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-secondary text-muted"><i class="fas fa-search-location"></i></span>
                                <input type="email" name="email" class="form-control" placeholder="user@domain.local" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-signal w-100 py-2">
                            <i class="fas fa-paper-plane me-2"></i> TRANSMETTRE LA REQUÊTE
                        </button>
                    </form>

                    <div class="mt-4 pt-3 border-top border-secondary border-opacity-25 text-center">
                        <a href="{% url 'profile' %}" class="text-decoration-none small text-muted hover-white">
                            <i class="fas fa-chevron-left me-1"></i> Retour au QG (Profil)
                        </a>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const canvas = document.getElementById('sonar-canvas');
    if (canvas && window.innerWidth >= 992) {
        const ctx = canvas.getContext('2d');
        let w, h;
        
        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Configuration Sonar
        const waves = [];
        const maxWaves = 6;
        
        class Wave {
            constructor() {
                this.reset();
                // Pour décaler les vagues au début
                this.radius = Math.random() * Math.max(w, h);
            }
            
            reset() {
                this.x = w / 2;
                this.y = h / 2;
                this.radius = 0;
                this.alpha = 1;
                this.speed = 1.5;
                this.color = Math.random() > 0.5 ? '99, 102, 241' : '168, 85, 247'; // Indigo ou Purple
            }
            
            update() {
                this.radius += this.speed;
                // L'opacité diminue à mesure que l'onde s'éloigne
                this.alpha = 1 - (this.radius / (Math.max(w, h) / 1.5));
                
                if (this.alpha <= 0) {
                    this.reset();
                }
            }
            
            draw() {
                if (this.alpha > 0) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.lineWidth = 2;
                    ctx.strokeStyle = `rgba(${this.color}, ${this.alpha})`;
                    ctx.stroke();
                }
            }
        }

        // Init
        for(let i=0; i<maxWaves; i++) {
            waves.push(new Wave());
        }

        function animate() {
            // Effet de fade pour laisser une micro traînée
            ctx.fillStyle = 'rgba(2, 4, 16, 0.2)';
            ctx.fillRect(0, 0, w, h);
            
            waves.forEach(wave => {
                wave.update();
                wave.draw();
            });
            
            requestAnimationFrame(animate);
        }
        animate();
    }
});
</script>
{% endblock %}
